    <div id="pierwszy_karako">
        <p>Pierwszy akapit/pierwszy DIV--> Karako <br>
            nazwa ID akapitu id="pierwszy_karako"</p>
        <p>Drugi akapit/pierwszy DIV <br>
            pierwszy akapit --> p:first-child{font-size:7mm;font-styl:italic;} <br>
            bo numer nieparzysty w dzienniku <br>
            pozostałe akapity --> p{font-size:11pt;} bo numer nieparzysty <br>
            szerokość bloku = 700+11*4=744pt <br>
            pierwszy DIV--> kolor jasno niebeski</p>
        <p>trzeci akapit/pierwszy DIV <br>
            pierwszy DIV--> obramowanie granatowy DIV <br>
            pierwszy DIV--> obramowanie grubość 5px, ciągłe (solid) <br>
            pierwszy DIV--> r1=7mm+8(Aliaksei)=15mm </p>
    </div>
    <div id="drugi_karako">
        <p>Pierwszy akapit/drugi DIV--> Aliaksei <br>
            nazwa ID akapitu id="drugi_karako"</p>
        <p>Drugi akapit/drugi DIV <br>
            drugi DIV--> kolor rózowy</p>
        <p>trzeci akapit/drugi DIV <br>
            drugi DIV--> obramowanie  czarny DIV <br>
            drugi DIV--> obramowanie grubość 3px, ciągłe (solid) <br>
            drugi DIV--> r2=7mm+6(Karako)=13mm</p>
    </div>
    <div id="trzeci_karako">
        <p>Pierwszy akapit/trzeci DIV--> klasa 1P nazwa ID akapitu id="trzeci_karako"</p>
        <p>Drugi akapit/trzeci DIVbr <br>
            pierwszy DIV--> kolor jasno zielony</p>
        <p>trzeci akapit/trzeci DIV(solid) <br>
            trzeci DIV--> obramowanie fioletowy DIV <br>
            trzeci DIV--> obramowanie grubość 7px, ciągłe (solid) <br>
            trzeci DIV--> r3=7mm+12(grudzien)=19mm</p>
    </div>
</body>
